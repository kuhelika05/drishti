<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
  <meta name="theme-color" content="#040c18"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>DRISHTI — Sign In</title>
  <link rel="stylesheet" href="../assets/base.css"/>
  <style>
    .login-page {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .login-scroll {
      flex: 1; overflow-y: auto; display: flex;
      flex-direction: column; align-items: center;
      justify-content: center; padding: 28px 26px 16px;
      scrollbar-width: none;
    }
    .login-scroll::-webkit-scrollbar { display: none; }

    .emblem { margin-bottom: 20px; }
    .login-tagline {
      font-size: 11px; color: rgba(126,200,255,0.42);
      letter-spacing: .06em; text-align: center;
      line-height: 1.65; margin-bottom: 26px;
    }
    .secure-badge {
      display: flex; align-items: center; gap: 8px;
      background: rgba(56,140,255,0.07);
      border: 1px solid rgba(56,140,255,0.2);
      border-radius: var(--r-md); padding: 8px 14px;
      margin-bottom: 26px;
      font-size: 11px; color: rgba(126,200,255,0.58);
    }
    .login-form { width: 100%; }
    .form-field { margin-bottom: 14px; }
    .pw-wrap { position: relative; }
    .pw-eye {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%); cursor: pointer;
      color: rgba(126,200,255,0.32); padding: 4px;
    }
    .pw-eye input { display: none; }

    .login-opts {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 20px; font-size: 11px;
    }
    .remember { display: flex; align-items: center; gap: 6px; color: var(--col-text3); cursor: pointer; }
    .remember input[type=checkbox] { accent-color: #378ADD; width: 14px; height: 14px; }
    .forgot { color: var(--col-blue-dim); cursor: pointer; }

    .btn-login {
      width: 100%; background: rgba(56,140,255,0.2);
      border: 1px solid rgba(126,200,255,0.42); color: var(--col-blue);
      border-radius: var(--r-md); padding: 13px;
      font-size: 14px; font-weight: 600;
      font-family: var(--font-main); letter-spacing: .1em;
      cursor: pointer; margin-bottom: 14px;
      transition: background .15s;
    }
    .btn-login:active { background: rgba(56,140,255,0.32); }

    .divider {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px; font-size: 10px; color: rgba(126,200,255,0.22);
    }
    .divider::before,.divider::after {
      content:''; flex:1; height:1px; background: rgba(56,140,255,0.14);
    }

    .btn-bio {
      width: 100%; background: rgba(77,232,160,0.08);
      border: 1px solid rgba(77,232,160,0.26); color: var(--col-green);
      border-radius: var(--r-md); padding: 11px;
      font-size: 13px; font-weight: 600;
      font-family: var(--font-main); letter-spacing: .06em;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 8px;
      transition: background .15s;
    }
    .btn-bio:active { background: rgba(77,232,160,0.16); }

    .signup-row {
      text-align: center; font-size: 11px;
      color: rgba(140,180,220,0.38); margin-top: 16px;
    }
    .signup-row span { color: var(--col-blue); cursor: pointer; }

    .login-footer-bar {
      padding: 10px 24px 20px;
      text-align: center; font-size: 10px;
      color: rgba(126,200,255,0.18);
      font-family: var(--font-mono);
      border-top: 1px solid rgba(56,140,255,0.07);
      flex-shrink: 0;
    }

    /* Error shake */
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      25%{transform:translateX(-8px)}
      75%{transform:translateX(8px)}
    }
    .shake { animation: shake .35s ease; }
  </style>
</head>
<body>
<div class="app-bg"></div>
<div class="app-overlay"></div>

<div class="login-page">
  <div class="login-scroll">

    <!-- Emblem -->
    <div class="emblem">
      <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
        <circle cx="36" cy="36" r="35" stroke="rgba(56,140,255,0.3)" stroke-width="1.5"/>
        <circle cx="36" cy="36" r="25" stroke="rgba(56,140,255,0.2)" stroke-width="1"/>
        <circle cx="36" cy="36" r="14" stroke="#378ADD" stroke-width="1.5"/>
        <circle cx="36" cy="36" r="6"  fill="#378ADD"/>
        <line x1="36" y1="1"  x2="36" y2="22" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="36" y1="50" x2="36" y2="71" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="1"  y1="36" x2="22" y2="36" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="50" y1="36" x2="71" y2="36" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="10" y1="10" x2="25" y2="25" stroke="rgba(56,140,255,0.3)" stroke-width="1" stroke-linecap="round"/>
        <line x1="62" y1="10" x2="47" y2="25" stroke="rgba(56,140,255,0.3)" stroke-width="1" stroke-linecap="round"/>
        <line x1="10" y1="62" x2="25" y2="47" stroke="rgba(56,140,255,0.3)" stroke-width="1" stroke-linecap="round"/>
        <line x1="62" y1="62" x2="47" y2="47" stroke="rgba(56,140,255,0.3)" stroke-width="1" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="t-logo mb4">DRISHTI</div>
    <div class="login-tagline">
      DPSU-driven Research &amp; Innovation for<br>
      Strategic &amp; High-impact Technology Integration
    </div>

    <div class="secure-badge">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1L2 3.5v4C2 10.5 4.5 12.8 7 13c2.5-.2 5-2.5 5-5.5v-4L7 1z"
              stroke="#7ec8ff" stroke-width="1.2" stroke-linejoin="round"/>
        <path d="M5 7l1.5 1.5L9 5.5" stroke="#7ec8ff" stroke-width="1.2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Secure HAL · Defence Network · MIL-SPEC
    </div>

    <form class="login-form" onsubmit="handleLogin(event)">
      <div class="form-field">
        <label class="input-label">Service ID / Employee No.</label>
        <input class="input-field" type="text" id="uid"
               placeholder="HAL-XXXXX" autocomplete="username"/>
      </div>

      <div class="form-field">
        <label class="input-label">Password</label>
        <div class="pw-wrap">
          <input class="input-field" type="password" id="pwd"
                 placeholder="••••••••" autocomplete="current-password"
                 style="padding-right:40px"/>
          <div class="pw-eye" onclick="togglePwd()">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <ellipse cx="8" cy="8" rx="6" ry="4" stroke="currentColor" stroke-width="1.3"/>
              <circle cx="8" cy="8" r="1.8" fill="currentColor"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="login-opts">
        <label class="remember">
          <input type="checkbox" id="rememberDev" checked/>
          Remember device
        </label>
        <span class="forgot" onclick="forgotPwd()">Forgot password?</span>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">Sign In</button>

      <div class="divider">or authenticate with</div>

      <button type="button" class="btn-bio" onclick="biometricLogin()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="6" r="3.2" stroke="#4de8a0" stroke-width="1.4"/>
          <path d="M3 16c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="#4de8a0" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M6.5 5.5c.2-.8.8-1.5 1.5-1.8" stroke="#4de8a0" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        Biometric / Smart Card
      </button>
    </form>

    <div class="signup-row">
      New personnel? <span onclick="requestAccess()">Request access ↗</span>
    </div>

  </div>
  <div class="login-footer-bar">
    HAL · SM-Q Test House · v2.4.1 · AES-256 ENCRYPTED
  </div>
</div>

<script>
function handleLogin(e) {
  e.preventDefault();
  const uid = document.getElementById('uid').value.trim();
  const pwd = document.getElementById('pwd').value;
  if (!uid || !pwd) { shakeForm(); return; }
  const btn = document.getElementById('loginBtn');
  btn.textContent = 'Authenticating…';
  btn.disabled = true;
  setTimeout(() => {
    const user = { name: 'Sandip Kumar Burnwal', initials: 'SK', serviceId: uid };
    localStorage.setItem('drishti_user', JSON.stringify(user));
    localStorage.setItem('drishti_token', 'session_' + Date.now());
    window.location.href = '../screens/02-dashboard.html';
  }, 1400);
}

function biometricLogin() {
  const btn = document.querySelector('.btn-bio');
  btn.textContent = 'Verifying biometric…';
  setTimeout(() => {
    const user = { name: 'Sandip Kumar Burnwal', initials: 'SK', serviceId: 'HAL-04281' };
    localStorage.setItem('drishti_user', JSON.stringify(user));
    localStorage.setItem('drishti_token', 'bio_' + Date.now());
    window.location.href = '../screens/02-dashboard.html';
  }, 1200);
}

function togglePwd() {
  const f = document.getElementById('pwd');
  f.type = f.type === 'password' ? 'text' : 'password';
}

function shakeForm() {
  const f = document.querySelector('.login-form');
  f.classList.add('shake');
  setTimeout(() => f.classList.remove('shake'), 400);
}

function forgotPwd()    { alert('Contact your HAL Security Officer to reset your password.\nEmail: security@hal-india.co.in'); }
function requestAccess(){ alert('To request DRISHTI access, contact:\nSM-Q Test House, HAL Bengaluru\nEmail: smq@hal-india.co.in'); }

// Auto-redirect if already logged in
(function() {
  if (localStorage.getItem('drishti_token')) {
    window.location.href = '../screens/02-dashboard.html';
  }
})();
</script>
</body>
</html>
